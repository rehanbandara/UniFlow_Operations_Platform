# ================================
# APP BASIC CONFIG
# ================================
# Uses env variable, fallback to default if not set
spring.application.name=${SPRING_APPLICATION_NAME:smartcampus-backend}
server.port=${SERVER_PORT:8081}

# ================================
# MONGODB CONFIG
# ================================
# MUST be provided via environment variable
# spring.data.mongodb.uri=${MONGODB_URI}
# spring.data.mongodb.uri=mongodb+srv://root:4PsnsgX9SdEUgOae@smartcampus.gmpfr2o.mongodb.net/?appName=smartcampus

spring.data.mongodb.uri=mongodb+srv://root:4PsnsgX9SdEUgOae@smartcampus.gmpfr2o.mongodb.net/smartcampus?appName=smartcampus



# ================================
# JWT CONFIG
# ================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ================================
# GOOGLE OAUTH2 CONFIG
# ================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Default scopes for Google login
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ================================
# FRONTEND REDIRECT URL
# ================================
app.frontend.oauth2-redirect-url=${APP_FRONTEND_OAUTH2_REDIRECT_URL:http://localhost:3000/oauth2/callback}

# ================================
# SPRING INTERNAL SETTINGS
# ================================
# Prevent circular dependency issues
spring.main.allow-circular-references=false


